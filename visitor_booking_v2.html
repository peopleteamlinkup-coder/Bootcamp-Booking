
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1.5rem 0; max-width: 580px; margin: 0 auto; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.form-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
.form-icon { width: 38px; height: 38px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; color: #0F6E56; font-size: 19px; flex-shrink: 0; }
.form-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.form-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
label { display: block; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; margin-top: 14px; letter-spacing: 0.01em; }
input { width: 100%; }
.btn-submit { width: 100%; margin-top: 1.25rem; padding: 11px; font-size: 14px; font-weight: 500; background: #1D9E75; border: none; border-radius: var(--border-radius-md); cursor: pointer; color: #fff; letter-spacing: 0.01em; transition: background 0.15s; }
.btn-submit:hover { background: #0F6E56; }
.btn-back { width: 100%; margin-top: 10px; padding: 9px; font-size: 13px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-secondary); transition: background 0.15s; }
.btn-back:hover { background: var(--color-background-secondary); }
.err { font-size: 12px; color: #A32D2D; margin-top: 8px; min-height: 16px; }

.pass-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.pass-top { background: #0F6E56; padding: 1.25rem 1.5rem; position: relative; overflow: hidden; }
.pass-top-shimmer { position: absolute; top: 0; left: -120%; width: 80px; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent); animation: sweep 3s infinite; pointer-events: none; }
@keyframes sweep { 0%{left:-120%} 100%{left:160%} }
.pass-top-label { font-size: 10px; color: #9FE1CB; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.pass-top-name { font-size: 20px; font-weight: 500; color: #fff; }
.pass-top-id { font-size: 11px; color: #9FE1CB; margin-top: 3px; font-family: var(--font-mono); }
.pass-body { padding: 1.25rem 1.5rem; }
.pass-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; margin-bottom: 1.25rem; }
.pf-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
.pf-val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1rem 0; }
.qr-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.qr-top-row { display: flex; align-items: center; gap: 6px; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; animation: pulse 2s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.qr-live-label { font-size: 11px; color: #0F6E56; font-weight: 500; }
canvas#qrcanvas { border-radius: 6px; border: 0.5px solid var(--color-border-tertiary); }
.qr-timer { font-size: 10px; color: var(--color-text-secondary); }

.sheets-hint { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; border: 0.5px solid var(--color-border-tertiary); }
.sheets-hint p { font-size: 12px; color: var(--color-text-secondary); }
.sheets-hint input { font-size: 12px; margin-top: 6px; }
</style>

<div class="wrap">
  <h2 class="sr-only">Visitor clearance booking system</h2>

  <div id="form-view">
    <div class="card">
      <div class="form-header">
        <div class="form-icon"><i class="ti ti-clipboard-check" aria-hidden="true"></i></div>
        <div>
          <p class="form-title">Visitor clearance form</p>
          <p class="form-sub">All fields are required</p>
        </div>
      </div>

      <label>Visitor name</label>
      <input type="text" id="f-name" placeholder="Full name of visitor" />

      <label>Purpose of visit</label>
      <input type="text" id="f-purpose" placeholder="e.g. Personal visit, delivery, meeting" />

      <label>Resident being visited</label>
      <input type="text" id="f-resident" placeholder="Full name of resident" />

      <label>Date of visit</label>
      <input type="date" id="f-date" />

      <p class="err" id="err-msg"></p>
      <button class="btn-submit" onclick="generatePass()">
        <i class="ti ti-id-badge-2" aria-hidden="true" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>Generate clearance pass
      </button>
    </div>
  </div>

  <div id="pass-view" style="display:none">
    <div class="pass-card">
      <div class="pass-top">
        <div class="pass-top-shimmer"></div>
        <p class="pass-top-label">Visitor clearance pass</p>
        <p class="pass-top-name" id="p-name">—</p>
        <p class="pass-top-id" id="p-id">—</p>
      </div>
      <div class="pass-body">
        <div class="pass-fields">
          <div>
            <p class="pf-label">Purpose of visit</p>
            <p class="pf-val" id="p-purpose">—</p>
          </div>
          <div>
            <p class="pf-label">Visiting resident</p>
            <p class="pf-val" id="p-resident">—</p>
          </div>
          <div>
            <p class="pf-label">Date of visit</p>
            <p class="pf-val" id="p-date">—</p>
          </div>
          <div>
            <p class="pf-label">Issued at</p>
            <p class="pf-val" id="p-time">—</p>
          </div>
        </div>

        <hr class="divider">

        <div class="qr-section">
          <div class="qr-top-row">
            <span class="live-dot"></span>
            <span class="qr-live-label">Live verification QR</span>
          </div>
          <canvas id="qrcanvas" width="164" height="164"></canvas>
          <p class="qr-timer" id="qr-timer">Refreshes in 30s</p>
        </div>
      </div>
    </div>

    <button class="btn-back" onclick="resetForm()">
      <i class="ti ti-arrow-left" aria-hidden="true" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>New booking
    </button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
let passData = null;
let qrInterval = null;
let secsLeft = 30;

function uid() {
  return 'VIS-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substr(2,4).toUpperCase();
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(day) + ' ' + months[parseInt(m)-1] + ' ' + y;
}

function token() {
  const slot = Math.floor(Date.now() / 30000);
  return btoa(slot + ':' + (passData ? passData.id : '')).replace(/=/g,'');
}

function drawQR() {
  const canvas = document.getElementById('qrcanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 164, 164);
  const payload = JSON.stringify({ id: passData.id, name: passData.name, resident: passData.resident, date: passData.date, token: token(), ts: Date.now() });
  const el = document.createElement('div');
  try {
    new QRCode(el, { text: payload, width: 160, height: 160, colorDark: '#085041', colorLight: '#FFFFFF', correctLevel: QRCode.CorrectLevel.M });
    setTimeout(() => {
      const img = el.querySelector('img') || el.querySelector('canvas');
      if (!img) return;
      if (img.tagName === 'IMG') {
        const i = new Image(); i.onload = () => ctx.drawImage(i, 2, 2, 160, 160); i.src = img.src;
      } else { ctx.drawImage(img, 2, 2, 160, 160); }
    }, 120);
  } catch(e) {}
}

function startQR() {
  if (qrInterval) clearInterval(qrInterval);
  secsLeft = 30 - (Math.floor(Date.now() / 1000) % 30);
  drawQR();
  document.getElementById('qr-timer').textContent = 'Refreshes in ' + secsLeft + 's';
  qrInterval = setInterval(() => {
    secsLeft--;
    if (secsLeft <= 0) { secsLeft = 30; drawQR(); }
    document.getElementById('qr-timer').textContent = 'Refreshes in ' + secsLeft + 's';
  }, 1000);
}

function generatePass() {
  const name = document.getElementById('f-name').value.trim();
  const purpose = document.getElementById('f-purpose').value.trim();
  const resident = document.getElementById('f-resident').value.trim();
  const date = document.getElementById('f-date').value;
  const err = document.getElementById('err-msg');

  if (!name || !purpose || !resident || !date) {
    err.textContent = 'Please fill in all fields before generating a pass.'; return;
  }
  err.textContent = '';

  passData = {
    id: uid(), name, purpose, resident, date,
    time: new Date().toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' })
  };

  document.getElementById('p-name').textContent = name;
  document.getElementById('p-id').textContent = passData.id;
  document.getElementById('p-purpose').textContent = purpose;
  document.getElementById('p-resident').textContent = resident;
  document.getElementById('p-date').textContent = fmtDate(date);
  document.getElementById('p-time').textContent = passData.time;

  document.getElementById('form-view').style.display = 'none';
  document.getElementById('pass-view').style.display = 'block';
  setTimeout(startQR, 200);

  const url = 'https://script.google.com/macros/s/AKfycbz2OMriGa7Eklt5FyQkWCeK8PpxiNAgFVp2IwJf_UBVZBjQYffJ9Fiv8CO64VUSeuBR/exec';

fetch(url, {
  method: 'POST',
  mode: 'no-cors',
  headers: {
    'Content-Type': 'text/plain;charset=utf-8'
  },
  body: JSON.stringify(passData)
})
.then(response => {
  console.log('Booking submitted');
})
.catch(error => {
  console.error('Sheet logging failed:', error);
});
}

function resetForm() {
  if (qrInterval) clearInterval(qrInterval);
  passData = null;
  ['f-name','f-purpose','f-resident','f-date'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('err-msg').textContent = '';
  document.getElementById('form-view').style.display = 'block';
  document.getElementById('pass-view').style.display = 'none';
}
</script>
