<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Verify Visitor Pass</title><style>*{box-sizing:border-box;margin:0;padding:0}:root{--teal:#18C6B6;--teal-dark:#0FAE9A;--navy:#1D2E5B;--muted:#657083;--border:#DDE8EA;--danger:#B3261E;--success:#0B8F69}body{font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#F5FBFA,#fff,#EAF9F7);min-height:100vh;color:#18233F;display:flex;align-items:center;justify-content:center;padding:22px}.card{width:100%;max-width:520px;background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:0 18px 45px rgba(29,46,91,.12);overflow:hidden}.top{background:linear-gradient(135deg,var(--navy),#086B73,var(--teal-dark));padding:24px;color:#fff;text-align:center}.logo-wrap{display:inline-block;background:rgba(255,255,255,.96);border-radius:14px;padding:10px 14px;margin-bottom:14px}.logo{width:170px;display:block}.top h1{font-size:24px;margin-bottom:5px}.top p{font-size:13px;opacity:.92}.body{padding:26px}.status{text-align:center;padding:18px;border-radius:16px;margin-bottom:22px;font-weight:900;font-size:20px}.loading{background:#F1F7F7;color:var(--muted)}.valid{background:#E8F8F2;color:var(--success);border:1px solid #B7E7D6}.invalid{background:#FDECEC;color:var(--danger);border:1px solid #F4B8B2}.expired{background:#FFF4E1;color:#9A5B00;border:1px solid #F2D49B}.row{border-bottom:1px solid var(--border);padding:12px 0}.label{font-size:11px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}.value{font-size:16px;font-weight:800;color:var(--navy);word-break:break-word}.small{margin-top:18px;font-size:12px;color:var(--muted);text-align:center;line-height:1.45}</style></head><body><div class="card"><div class="top"><div class="logo-wrap"><img src="linkup-logo.png" alt="LinkUp Logo" class="logo"></div><h1>Visitor Pass Verification</h1><p>Security verification page</p></div><div class="body"><div id="status" class="status loading">Checking pass...</div><div id="details"></div><p class="small">Verification is based on the visitor booking records saved in the official LinkUp Google Sheet.</p></div></div><script>const SCRIPT_URL='https://script.google.com/macros/s/AKfycbz2OMriGa7Eklt5FyQkWCeK8PpxiNAgFVp2IwJf_UBVZBjQYffJ9Fiv8CO64VUSeuBR/exec';function getParam(n){return new URLSearchParams(window.location.search).get(n)}function fmtDate(d){if(!d)return '—';const p=d.split('-');if(p.length!==3)return d;const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return parseInt(p[2],10)+' '+m[parseInt(p[1],10)-1]+' '+p[0]}function isExpired(dateStr){if(!dateStr)return true;const t=new Date();t.setHours(0,0,0,0);const v=new Date(dateStr+'T00:00:00');return v<t}function row(l,v){return '<div class="row"><div class="label">'+l+'</div><div class="value">'+(v||'—')+'</div></div>'}async function verify(){const id=getParam('id'),s=document.getElementById('status'),d=document.getElementById('details');if(!id){s.className='status invalid';s.textContent='INVALID PASS';d.innerHTML=row('Reason','No pass ID was provided.');return}try{const res=await fetch(SCRIPT_URL+'?id='+encodeURIComponent(id));const data=await res.json();if(!data.found){s.className='status invalid';s.textContent='INVALID PASS';d.innerHTML=row('Pass ID',id)+row('Reason','This pass was not found in the booking records.');return}const exp=isExpired(data.date);s.className=exp?'status expired':'status valid';s.textContent=exp?'EXPIRED PASS':'VALID PASS';d.innerHTML=row('Pass ID',data.id)+row('Visitor Name',data.name)+row('Site',data.site)+row('Resident',data.resident)+row('Purpose',data.purpose)+row('Visit Date',fmtDate(data.date))+row('Issued Time',data.time)+row('Record Timestamp',data.timestamp)}catch(e){s.className='status invalid';s.textContent='VERIFICATION ERROR';d.innerHTML=row('Reason','Could not connect to the verification service.')}}verify();</script></body></html>
